    // ==================== 天气系统 ====================
    function updateWeather() {
        var season = Math.floor((player.month - 1) / 3);
        var baseWeather = [0, 2, 4, 6];
        
        if (Math.random() < 0.3) {
            var base = baseWeather[season];
            var offset = Math.floor(Math.random() * 3) - 1;
            player.weather = Math.max(0, Math.min(WEATHER_TYPES.length - 1, base + offset));
        }
        
        var w = WEATHER_TYPES[player.weather];
        document.getElementById('weatherIcon').textContent = w.icon;
        document.getElementById('weatherText').textContent = "天气：" + w.name;
        
        return w;
    }
    
    // ==================== 核心功能 ====================
    function log(text, type) {
        type = type || "normal";
        var colors = { normal: "#c4b49c", important: "#cd7a8a", success: "#8acd7a", combat: "#c97a7a", system: "#7a9acd", item: "#b8a0d0" };
        var div = document.createElement('div');
        div.className = "log-msg";
        div.style.color = colors[type] || colors.normal;
        div.innerHTML = text;
        document.getElementById('gameLog').appendChild(div);
        document.getElementById('gameLog').scrollTop = 9999;
    }

    function sendCmd() {
        var input = document.getElementById('commandInput');
        var cmd = input.value.trim();
        var cmdLower = cmd.toLowerCase();
        if (!cmd) return;
        input.value = "";
        log("> " + cmd, "system");
        
        // 问句类 → 问答系统
        if (cmdLower.includes("吗") || cmdLower.includes("呢") || cmdLower.includes("?") || cmdLower.includes("什么") || cmdLower.includes("谁") || cmdLower.includes("如何") || cmdLower.includes("怎么")) {
            handleQA(cmdLower);
        }
        // 状态/属性 → 显示状态
        else if (cmdLower.includes("状态") || cmdLower.includes("属性") || cmdLower.includes("看我") || cmdLower.includes("自己")) {
            showStatus();
        }
        // 背包/物品/道具 → 背包面板
        else if (cmdLower.includes("背包") || cmdLower.includes("物品") || cmdLower.includes("道具") || cmdLower.includes("包") || cmdLower.includes("干粮")) {
            openInventory();
        }
        // 雇佣/镖局 → 雇佣护卫
        else if (cmdLower.includes("雇佣") || cmdLower.includes("雇保镖") || cmdLower.includes("请保镖")) {
            handleHireGuard(cmd);
        }
        // 解雇护卫
        else if (cmdLower.includes("解散") || cmdLower.includes("解雇护卫")) {
            handleHireGuard("解散");
        }
        // 行情/物价/市场 → 查看行情
        else if (cmdLower.includes("行情") || cmdLower.includes("物价") || cmdLower.includes("市场")) {
            var loc = LOCATIONS[player.location];
            if (TRADE_HUBS[player.location]) {
                showMarketDialog();
            } else {
                log("此处非市场，无法查看行情。", "system");
            }
        }
        // 买交通工具
        else if (cmdLower.includes("买马") || cmdLower.includes("买车") || cmdLower.includes("买船") || cmdLower.includes("买坐骑") || cmdLower.includes("购买马") || cmdLower.includes("购买车") || cmdLower.includes("购买船")) {
            handleBuyMount(cmdLower);
        }
        // 买/卖 → 贸易（使用handleTradeCmd）
        else if (cmdLower.includes("买") || cmdLower.includes("卖")) {
            handleTradeCmd(cmdLower);
        }
        // 商店/坊市 → 根据地点显示对应功能
        else if (cmdLower.includes("商店") || cmdLower.includes("坊市") || cmdLower.includes("大集") || cmdLower.includes("渡口")) {
            var loc = LOCATIONS[player.location];
            if (TRADE_HUBS[player.location]) {
                showMarketDialog();
            } else {
                log("此处非市场，无法交易。", "system");
            }
        }
        // 探索 → 探索
        else if (cmdLower.includes("探索")) {
            explore();

        // 前往/移动/去 → 前往面板
        else if (cmdLower.includes("前往") || cmdLower.includes("移动") || cmdLower.includes("去") || cmdLower.includes("走")) {
            openDestination();
        }
        // 打探/消息 → 打探
        else if (cmdLower.includes("打探") || cmdLower.includes("消息")) {
            askInfo();
        }
        // 环境/这里/四周 → 环境介绍
        else if (cmdLower.includes("环境") || cmdLower.includes("这里") || cmdLower.includes("四周")) {
            showEnvironment();

        // 使用/吃/喝/用 → 使用背包物品
        else if (cmdLower.includes("使用") || cmdLower.includes("吃") || cmdLower.includes("喝") || cmdLower.includes("用")) {
            // 识别具体物品
            if (cmdLower.includes("伤药") || cmdLower.includes("药")) {
                useItem("伤药");

                useItem("干粮");

                useItem("药材");

                log("请打开背包，选择要使用的物品。", "system");
            }
        }
        // 伤药/补血 → 使用伤药
        else if (cmdLower.includes("伤药") || cmdLower.includes("补血") || cmdLower.includes("治疗")) {
            useItem("伤药");
        }
        // 休息/恢复 → 休息恢复
        else if (cmdLower.includes("休息") || cmdLower.includes("恢复")) {

                player.rations -= 3;

        // 未知指令
        else {

            log("探索、前往、背包、商店、状态、休息", "item");

            log("或输入「天气如何」「曹操是谁」等提问", "system");
        }

    // ==================== 环境介绍 ====================
    function showEnvironment() {
        var loc = LOCATIONS[player.location];
        var placeName = player.place || player.location;
        
        document.getElementById('mainPanel').style.display = 'none';
        document.getElementById('envPanel').style.display = 'block';
        
        var title = "🏞️ " + placeName;
        if (player.place && loc.places && loc.places[player.place]) {
            title += " · " + loc.places[player.place].type;
        }
        document.getElementById('envTitle').textContent = title;
        
        var envDesc = loc.envDesc || loc.desc;
        if (player.place && loc.places && loc.places[player.place] && loc.places[player.place].env) {
            envDesc = loc.places[player.place].env;
        }
        document.getElementById('envDesc').textContent = envDesc;
        
        var html = "";
        
        // 地点详情
        if (player.place && loc.places && loc.places[player.place]) {
            var place = loc.places[player.place];
            html += '<div style="background:#1a1520;padding:10px;border-radius:6px;margin-bottom:10px;border-left:3px solid #9ab87a;">';
            html += '<div style="color:#9ab87a;font-size:0.8rem;">类型：' + place.type + '</div>';
            html += '<div style="color:#8a7a6a;font-size:0.75rem;margin-top:4px;">' + place.env + '</div>';
            html += '</div>';
        }
        
        // NPC对话
        if (loc.npcs && loc.npcs.length > 0) {
            html += '<div style="color:#7a9acd;font-size:0.8rem;margin:10px 0;">💬 路人交谈</div>';
            loc.npcs.forEach(function(npc) {
                html += '<div class="env-npc"><div class="env-npc-name">👤 ' + npc.name + '</div><div class="env-npc-text">"' + npc.text + '"</div></div>';
            });
        }
        
        // 集市吆呵
        if (loc.yells && loc.yells.length > 0) {
            html += '<div style="color:#c4a060;font-size:0.8rem;margin:10px 0;">📢 街市之声</div>';
            loc.yells.forEach(function(yell) {
                html += '<div class="env-yell"><div class="env-yell-text">"' + yell + '"</div></div>';
            });
        }
        
        // 道路信息
        if (loc.road) {
            var road = ROAD_TYPES[loc.road];
            html += '<div style="background:#1a1520;padding:10px;border-radius:6px;margin-top:10px;">';
            html += '<div style="color:#d4af37;font-size:0.8rem;">🛤️ 道路：' + loc.road + '</div>';
            html += '<div style="color:#8a7a6a;font-size:0.75rem;">' + road.desc + '</div>';
            html += '<div style="color:#8a7a6a;font-size:0.75rem;margin-top:4px;">干粮消耗：' + road.rationsPerDay + '份/日</div>';
            html += '</div>';
        }
        
        // 相邻城市
        if (loc.nearby && loc.nearby.length > 0) {
            html += '<div style="background:#1a1520;padding:10px;border-radius:6px;margin-top:10px;">';
            html += '<div style="color:#7a9acd;font-size:0.8rem;">📍 相邻：' + loc.nearby.join('、') + '</div>';
            html += '</div>';
        }
        
        if (!html) {

    // ==================== 移动系统 ====================
    function calculateTravelTime(fromCity, toCity) {
        var weather = WEATHER_TYPES[player.weather];
        var mount = MOUNTS[player.mount] || { speedMod: 1 };
        var baseDays = 1;
        var fromLoc = LOCATIONS[fromCity];
        
        if (!fromLoc.nearby || fromLoc.nearby.indexOf(toCity) === -1) {
            baseDays = 2;
        }
        
        var roadType = fromLoc.road || "官道";
        var road = ROAD_TYPES[roadType];
        var roadMod = road.baseSpeed;
        
        var totalDays = Math.ceil(baseDays / (roadMod * weather.speedMod * mount.speedMod));
        
        return Math.max(1, totalDays);
    }
    
    function calculateRationsCost(days) {
        var roadType = LOCATIONS[player.location].road || "官道";
        var road = ROAD_TYPES[roadType];
        return Math.ceil(road.rationsPerDay * days * 0.7);
    }

    // 计算当前载重
    function calculateCurrentLoad() {
        var load = 0;
        // 货物重量
        for (var g in player.goods) {
            if (GOODS[g]) {
                load += player.goods[g] * GOODS[g].weight;
            }
        }
        // 背包物品重量（简化：每件算1）
        for (var item in player.inventory) {
            if (player.inventory[item] > 0) {
                load += player.inventory[item];
            }
        }
        // 干粮重量
        load += Math.floor(player.rations / 5); // 每5份算1个重量
        return load;
    }
    
    // 计算过路费
    function calculateToll(city) {
        var destLoc = LOCATIONS[city];
        if (!destLoc) return 0;
        var rulerInfo = FACTION_RULERS[destLoc.faction] || FACTION_RULERS["流浪"];
        var rulerStyle = RULER_STYLES[rulerInfo.style];
        
        // 货物价值影响过路费
        var goodsValue = 0;
        for (var g in player.goods) {
            if (GOODS[g] && player.goods[g] > 0) {
                goodsValue += player.goods[g] * GOODS[g].basePrice;
            }
        }
        
        // 根据统治者风格计算过路费
        if (rulerStyle.tax === 0) return 0; // 仁德不收税
        var toll = Math.floor(goodsValue * rulerStyle.tax / 100);
        return Math.max(0, toll);
    }

    function travelTo(city) {
        var days = calculateTravelTime(player.location, city);

        var toll = calculateToll(city);

        if (rationsCost > player.rations) {
            log("干粮不足！需要" + rationsCost + "份干粮，行军" + days + "天。", "combat");
            return;
        }
        
        // 消耗干粮
        player.rations -= rationsCost;
        
        var weather = WEATHER_TYPES[player.weather];
        var mountStr = player.mount ? MOUNTS[player.mount].name : "步行";
        var destLoc = LOCATIONS[city];
        var rulerInfo = FACTION_RULERS[destLoc.faction] || FACTION_RULERS["流浪"];
        var rulerStyle = RULER_STYLES[rulerInfo.style];
        
        log("═══════════════════", "system");
        log("🚗 商旅启程 → 「" + city + "」", "important");
        log("═══════════════════", "system");
        log("📅 行军" + days + "天 | " + weather.icon + weather.name + " | " + mountStr, "system");
        log("🍙 干粮消耗：" + rationsCost + "份", "item");
        
        // 获取道路情报
        var roadKey1 = player.location + "-" + city;
        var roadKey2 = city + "-" + player.location;
        var roadInfo = player.roadIntel[roadKey1] || player.roadIntel[roadKey2];
        var roadStatus = roadInfo ? roadInfo.status : "崎岖";
        var statusData = ROAD_STATUS[roadStatus] || ROAD_STATUS["崎岖"];
        
        log("🛤️ 道路状况：" + statusData.icon + roadStatus, "item");
        
        // 仁德统治者可能有护送
        if (rulerStyle.escort) {
            log("💚 " + rulerInfo.name + "派官军沿途护送，一路平安！", "success");
        }
        
        // 支付过路费
        if (toll > 0) {
            player.silver -= toll;
            log("👮 「" + rulerInfo.name + "」收取过路费：" + toll + "银两 💸", "combat");
        } else if (rulerStyle.tax === 0) {
            log("💚 " + rulerInfo.name + "治下免收过路费！", "success");
        }
        
        // 商旅事件
        var goodsValue = calculateGoodsValue();
        var hasGoods = goodsValue > 0;
        
        // 根据道路状态和统治者性格决定事件
        if (rulerStyle.danger && Math.random() < 0.6) {
            // 残暴统治区 - 抢劫风险
            handleBrutalAreaEvent();
        } else if (hasGoods && roadStatus === "危险") {
            // 有货物 + 危险道路 - 盗匪风险
            handleBanditEvent();
        } else if (hasGoods && Math.random() < 0.3) {
            // 有货物可能遇到商队或税收检查
            handleTradeEvent();
        } else if (Math.random() < 0.4) {
            // 正常旅途事件
            handleNormalTravelEvent();
        }
        
        // 到达城市
        player.location = city;
        player.place = null;
        if (player.discovered.indexOf(city) === -1) {
            player.discovered.push(city);
        }
        
        log("═══════════════════", "system");
        log("🏛️ 抵达「" + city + "」", "success");
        log("═══════════════════", "system");
        log(LOCATIONS[city].desc, "normal");
        
        // 显示贸易情报
        if (TRADE_HUBS[city]) {
            var hub = TRADE_HUBS[city];
            var specialty = GOODS[hub.specialty];
            log("📢 市集行情：本城特产【" + hub.specialty + "】，需求【" + hub.demand + "】", "item");
        }
        
        // 显示NPC对话
        var loc = LOCATIONS[city];
        if (loc.npcs && loc.npcs.length > 0) {
            var npc = loc.npcs[Math.floor(Math.random() * loc.npcs.length)];
            log("「" + npc.name + "」道：" + npc.text, "item");
        }
        
        if (loc.yells && loc.yells.length > 0 && Math.random() > 0.5) {
            var yell = loc.yells[Math.floor(Math.random() * loc.yells.length)];
            log("远处传来吆喝声：" + yell, "item");
        }
        
        // 更新道路情报
        updateRoadIntel(city);
        
        advanceTime(days);
        checkQuest("city");
        closeDestination();
        updateUI();
    }
    
    // 计算货物总价值
    function calculateGoodsValue() {
        var value = 0;
        for (var g in player.goods) {
            if (GOODS[g] && player.goods[g] > 0) {
                value += player.goods[g] * GOODS[g].basePrice;
            }
        }
        return value;
    }
    
    // 残暴统治区事件
    function handleBrutalAreaEvent() {
        var goodsValue = calculateGoodsValue();
        if (goodsValue > 0 && Math.random() < 0.5) {
            var loss = Math.floor(goodsValue * (0.1 + Math.random() * 0.2));
            if (loss > 0) {
                // 随机损失货物
                var goodsList = Object.keys(player.goods).filter(function(g) { return player.goods[g] > 0; });
                if (goodsList.length > 0) {
                    var stolen = goodsList[Math.floor(Math.random() * goodsList.length)];
                    var stolenCount = Math.min(player.goods[stolen], Math.ceil(Math.random() * 3));
                    player.goods[stolen] -= stolenCount;
                    if (player.goods[stolen] <= 0) delete player.goods[stolen];
                    log("🔥 遭遇乱兵！货物被抢走【" + stolen + "】×" + stolenCount, "combat");
                }
            }
        }
        
        var scenes = [
            "沿途村庄荒废，百姓流离失所...",
            "遇到逃难的百姓，神情惊恐...",
            "只见乱兵烧杀抢掠，无人敢管..."
        ];
        log(scenes[Math.floor(Math.random() * scenes.length)], "combat");
    }
    
    // 盗匪事件
    function handleBanditEvent() {
        var roll = Math.random();
        if (player.guard >= 3) {
            log("🛡️ 商队护卫严密，盗匪望而却步！", "success");
        } else if (roll < 0.5) {
            var goodsList = Object.keys(player.goods).filter(function(g) { return player.goods[g] > 0; });
            if (goodsList.length > 0) {
                var stolen = goodsList[Math.floor(Math.random() * goodsList.length)];
                var stolenCount = Math.min(player.goods[stolen], 1 + Math.floor(Math.random() * 2));
                player.goods[stolen] -= stolenCount;
                if (player.goods[stolen] <= 0) delete player.goods[stolen];
                log("⚠️ 山贼出没！货物被劫【" + stolen + "】×" + stolenCount, "combat");
            }
        } else {
            log("⚠️ 山道偏僻，幸而平安通过...", "system");
        }
    }
    
    // 贸易事件
    function handleTradeEvent() {
        var roll = Math.random();
        if (roll < 0.4) {
            // 遇到商队，可以交易情报
            log("🐫 途中遇到商队，商人们热情招呼...", "item");
            log("💡 从商人处得知：某地正在闹灾，粮食价格看涨...", "success");
        } else if (roll < 0.7) {
            // 官府检查
            var goodsValue = calculateGoodsValue();
            var fine = Math.floor(goodsValue * 0.05);
            if (fine > 0) {
                player.silver = Math.max(0, player.silver - fine);
                log("👮 官府设卡检查，缴纳商税：" + fine + "银两", "system");
            }
        } else {
            log("🐫 与商队结伴而行，一路畅谈生意经...", "item");
        }
    }
    
    // 正常旅途事件
    function handleNormalTravelEvent() {
        var events = [
            { text: "沿途风景秀丽，心情舒畅", effect: function() { player.hp = Math.min(player.hp + 5, player.maxHp); }, type: "success" },
            { text: "路遇老农，施舍了些干粮", effect: function() { player.rations = Math.max(0, player.rations - 2); player.fame += 1; }, type: "item" },
            { text: "发现路边有散落的银两", effect: function() { player.silver += 3; }, type: "success" },
            { text: "遇到游方郎中，学得养生之道", effect: function() { player.maxHp += 5; }, type: "success" },
            { text: "山路难行，体力消耗较大", effect: function() { player.hp = Math.max(0, player.hp - 5); }, type: "combat" },
            { text: "天气突变，耽搁了一日", effect: function() { advanceTime(1); }, type: "system" }
        ];
        var evt = events[Math.floor(Math.random() * events.length)];
        evt.effect();
        log("🌟 " + evt.text, evt.type);
    }
    
    // 更新道路情报
    function updateRoadIntel(city) {
        var destLoc = LOCATIONS[city];
        if (!destLoc || !destLoc.nearby) return;
        
        // 收集目的地的相邻道路情报
        destLoc.nearby.forEach(function(nearbyCity) {
            if (LOCATIONS[nearbyCity]) {
                // 随机生成或更新道路状况
                if (!player.roadIntel[city + "-" + nearbyCity]) {
                    var statuses = ["畅通", "畅通", "畅通", "崎岖", "崎岖", "危险"];
                    var newStatus = statuses[Math.floor(Math.random() * statuses.length)];
                    player.roadIntel[city + "-" + nearbyCity] = {
                        status: newStatus,
                        known: false,
                        desc: newStatus === "畅通" ? "道路通畅，商旅络绎" : 
                              newStatus === "崎岖" ? "道路难行，需谨慎" : 
                              "盗匪出没，危险！"
                    };
                }
            }
        });
    }
    
    function stageTo(city) {
        if (player.silver < 30) {
            log("银两不足！需要30银两。", "combat");
            return;
        }
        
        player.silver -= 30;
        player.location = city;
        player.place = null;
        
        log("── 驿站传送至「" + city + "」──", "important");
        log("驿站掌柜笑道：客官慢走，转眼就到！", "item");
        log("花费：30银两 | 瞬间到达（货物不受影响）", "system");
        log(LOCATIONS[city].desc, "normal");
        
        if (player.discovered.indexOf(city) === -1) {
            player.discovered.push(city);
        }
        
        var loc = LOCATIONS[city];
        if (loc.envDesc) {
            log("【环境】" + loc.envDesc, "item");
        }
        
        // 显示贸易情报
        if (TRADE_HUBS[city]) {
            var hub = TRADE_HUBS[city];
            log("📢 市集行情：本城特产【" + hub.specialty + "】，需求【" + hub.demand + "】", "item");
        }
        
        updateRoadIntel(city);
        
        advanceTime(1);
        closeDestination();
        updateUI();
    }

            "您在城门口与守卫攀谈...",
            "您在茶馆中聆听众人议论...",

            "您在集市上闲逛...",

                var newStatus = statuses[Math.floor(Math.random() * statuses.length)];
                var descs = {
                    "畅通": "道路通畅，商旅络绎不绝",
                    "崎岖": "道路难行，需小心慢行",

                };
                player.roadIntel[player.location + "-" + roadCity] = {
                    status: newStatus,
                    known: true,
                    desc: descs[newStatus]
                };
                log("★ 探知道路：「" + roadCity + "」方向 - " + ROAD_STATUS[newStatus].icon + " " + newStatus, "important");
                log(descs[newStatus], "item");
            }
            
            // 发现新城市
            var newCities = currentLoc.nearby.filter(function(c) { return player.discovered.indexOf(c) === -1; });
            if (newCities.length > 0 && Math.random() > 0.5) {
                var found = newCities[Math.floor(Math.random() * newCities.length)];
                player.discovered.push(found);
                log("★ 发现新地点：「" + found + "」", "important");
                log(LOCATIONS[found].desc, "normal");
                
                // 同时获取该城市的情报
                if (LOCATIONS[found] && LOCATIONS[found].faction) {
                    var rulerInfo = FACTION_RULERS[LOCATIONS[found].faction];
                    if (rulerInfo) {
                        var rulerStyle = RULER_STYLES[rulerInfo.style];
                        log("📢 据说「" + rulerInfo.name + "」治下，" + rulerStyle.desc, "item");
                    }
                }
            }
        }
        
        // 探索结果
        var results = [
            { text: "发现野果，补充干粮", effect: function() { player.rations += 3; }, good: true },
            { text: "采到珍贵药材", effect: function() { player.inventory["药材"] = (player.inventory["药材"] || 0) + 1; }, good: true },
            { text: "遇见行商，赚了些钱", effect: function() { player.silver += 10; }, good: true },
            { text: "遇到游方郎中，学得医术", effect: function() { player.int += 2; }, good: true },
            { text: "遇见武林高手，切磋武艺", effect: function() { player.atk += 2; }, good: true },
            { text: "在茶馆听到重要情报", effect: function() { player.fame += 3; }, good: true },
            { text: "发现散落的银两", effect: function() { player.silver += 5; }, good: true },
            { text: "遇到商队，学得贸易之道", effect: function() { player.fame += 2; }, good: true },
            { text: "打听到某地缺粮，物价看涨", effect: function() { player.fame += 2; }, good: true },
            { text: "遭遇野兽！", effect: function() { startBattle(); return true; }, combat: true },
            { text: "遇到山贼！", effect: function() { startBattle(); return true; }, combat: true },
            { text: "风景甚好，稍作休息", effect: function() { player.hp = Math.min(player.hp + 10, player.maxHp); player.rations += 1; }, good: true },
            { text: "遇见流民，施舍了些干粮", effect: function() { player.rations = Math.max(0, player.rations - 3); player.fame += 2; }, neutral: true },
            { text: "路见不平，拔刀相助", effect: function() { player.fame += 5; player.silver += 15; }, good: true },
            { text: "在溪边生火做饭", effect: function() { player.rations += 2; player.hp = Math.min(player.hp + 5, player.maxHp); }, good: true },
            { text: "被偷了钱袋！", effect: function() { player.silver = Math.max(0, player.silver - 10); }, bad: true },
            { text: "一无所获", effect: function() {}, neutral: true }
        ];
        
        var r = results[Math.floor(Math.random() * results.length)];
        var isCombat = r.combat && r.effect();
        
        if (!isCombat) {
            var msgType = r.good ? "success" : (r.bad ? "combat" : (r.neutral ? "system" : "normal"));
            log(r.text, msgType);

        if (weather.speedMod < 0.7) {
            log("恶劣天气让您疲惫不堪，生命-5", "combat");
            player.hp -= 5;
        }
        
        advanceTime(1);
        checkBattle();
        updateUI();
    }
    
    // 检查是否死亡
    function checkBattle() {
        if (player.hp <= 0) {
            log("您体力耗尽，昏倒了...", "combat");
            player.hp = Math.floor(player.maxHp / 4);
            player.silver = Math.floor(player.silver / 2);
            player.rations = Math.floor(player.rations / 2);
            log("醒来后银两和干粮都丢了...", "system");
        }
    }
    
    // ==================== 战斗系统 ====================
    function startBattle() {
        var enemy = ENEMIES[Math.floor(Math.random() * ENEMIES.length)];
        player.battle = { name: enemy.name, hp: enemy.hp, maxHp: enemy.hp, atk: enemy.atk };
        
        document.getElementById('mainPanel').style.display = 'none';
        document.getElementById('battlePanel').style.display = 'block';
        
        updateBattleUI();
        log("⚔️ 遭遇" + enemy.name + "！", "combat");
    }
    
    function updateBattleUI() {
        document.getElementById('enemyName').textContent = player.battle.name;
        document.getElementById('enemyHp').textContent = player.battle.hp;
        document.getElementById('playerHp').textContent = player.hp;
        document.getElementById('playerMaxHp').textContent = player.maxHp;
    }
    
    function battleAction(action) {
        if (!player.battle) return;
        
        if (action === "attack") {
            var dmg = Math.max(1, player.atk - 2 + Math.floor(Math.random() * 4));
            player.battle.hp -= dmg;
            log("你攻击" + player.battle.name + "，造成" + dmg + "伤害！", "success");
            
            if (player.battle.hp <= 0) {
                winBattle();
                return;
            }
            
            var eDmg = Math.max(1, player.battle.atk - 5 + Math.floor(Math.random() * 3));
            player.hp -= eDmg;
            log(player.battle.name + "反击，" + eDmg + "伤害！", "combat");
        }
        else if (action === "defend") {
            var eDmg = Math.max(1, player.battle.atk - 10);
            player.hp -= eDmg;
            log("防御姿态，" + player.battle.name + "造成" + eDmg + "伤害！", "combat");
        }
        else if (action === "skill") {
            if (player.role === "谋士") {
                var dmg = player.int + Math.floor(Math.random() * 10);
                player.battle.hp -= dmg;
                log("你施展计谋，对" + player.battle.name + "造成" + dmg + "伤害！", "success");
                if (player.battle.hp <= 0) {
                    winBattle();
                    return;
                }
            } else {
                log("你尝试使用技能，但发现自己不擅长此道...", "system");
            }
            var eDmg = Math.max(1, player.battle.atk - 5);
            player.hp -= eDmg;
            log(player.battle.name + "攻击，" + eDmg + "伤害！", "combat");
        }
        else if (action === "flee") {
            if (Math.random() > 0.5) {
                log("逃跑成功！", "success");
                player.rations -= 1; // 逃跑只消耗1份干粮
                log("仓皇逃跑，消耗1份干粮。", "system");
                endBattle();
                return;
            } else {
                log("逃跑失败！", "combat");
                player.hp -= player.battle.atk;
            }
        }
        
        if (player.hp <= 0) {
            log("你被打败了！", "combat");
            player.hp = Math.floor(player.maxHp / 4);
            player.silver = Math.floor(player.silver / 2);
            // 不再减干粮，干粮是生存必需品
            log("您体力耗尽昏倒，醒来后发现银两丢失...", "system");
            endBattle();
            return;
        }
        
        updateBattleUI();
    }
    
    function winBattle() {
        log("★ 战斗胜利！", "important");
        var reward = 10 + Math.floor(Math.random() * 10);
        player.silver += reward;
        player.fame += 2;
        log("获得" + reward + "银两，名望+2", "success");
        endBattle();
    }
    
    function endBattle() {
        player.battle = null;
        document.getElementById('battlePanel').style.display = 'none';
        document.getElementById('mainPanel').style.display = 'block';
        updateUI();
    }
    
    // ==================== 商店系统 ====================
    function openShop() {
        var loc = LOCATIONS[player.location];
        if (!loc.shop) {
            log("此处无商店。", "system");
            return;
        }
        
        document.getElementById('mainPanel').style.display = 'none';
        document.getElementById('shopPanel').style.display = 'block';
        
        // 初始化/刷新商家库存（每次进入商店有几率补充）
        for (var item in SHOP_ITEMS) {
            if (shopStock[item] === undefined) {
                shopStock[item] = 3 + Math.floor(Math.random() * 5); // 初始库存 3-7
            } else if (shopStock[item] < 2 && Math.random() > 0.5) {
                // 库存不足时有几率补货
                shopStock[item] += Math.floor(Math.random() * 3) + 1;
            }
        }
        
        var discount = 1;
        var html = "";
        
        // 获取玩家已拥有数量
        function getPlayerCount(item) {
            if (item === "干粮") return player.rations;
            return player.inventory[item] || 0;
        }
        
        // 获取商家库存
        function getShopStock(item) {
            return shopStock[item] || 0;
        }
        
        // 按分类显示物品
        var categories = {};
        for (var item in SHOP_ITEMS) {
            var cat = SHOP_ITEMS[item].category || "杂货";
            if (!categories[cat]) categories[cat] = [];
            categories[cat].push(item);
        }
        
        for (var cat in categories) {
            var color = ITEM_COLORS[cat] || "#c4a060";
            html += '<div style="color:' + color + ';font-size:0.85rem;margin:10px 0 8px;border-bottom:1px solid #2a1a10;padding-bottom:4px;">◆ ' + cat + '</div>';
            
            categories[cat].forEach(function(item) {
                var price = Math.floor(SHOP_ITEMS[item].price * discount);
                var playerCount = getPlayerCount(item);
                var currentStock = getShopStock(item);
                var disabled = (player.silver < price || currentStock <= 0) ? ' style="opacity:0.5;cursor:not-allowed;"' : '';
                var priceColor = player.silver < price ? "#c97a7a" : "#d4af37";
                var stockColor = currentStock <= 0 ? "#c97a7a" : (currentStock <= 2 ? "#d4a060" : "#8acd7a");
                var stockText = currentStock <= 0 ? "售罄" : "库存:" + currentStock;
                
                // 玩家已有数量提示
                var haveText = playerCount > 0 ? ' <span style="color:#8acd7a">（持有' + playerCount + '）</span>' : '';
                
                html += '<div class="item-row"><div><div style="color:#c4b49c">' + item + haveText + '</div><div style="font-size:0.7rem;color:#8a7a6a">' + SHOP_ITEMS[item].desc + '</div><div style="font-size:0.65rem;color:' + stockColor + '">' + stockText + '</div></div><div style="text-align:right;"><span style="color:' + priceColor + '">' + price + '银</span><button data-buy="' + item + '" data-price="' + price + '" ' + disabled + ' style="margin-left:8px;padding:4px 10px;background:#8b4513;color:#d4af37;border:none;border-radius:4px;cursor:pointer;">买</button></div></div>';
            });
        }
        
        // 银两余额提示
        html += '<div style="text-align:center;color:#d4af37;font-size:0.8rem;margin-top:12px;padding:8px;background:#1a1520;border-radius:6px;">💰 银两余额：' + player.silver + '银</div>';
        
        document.getElementById('shopItems').innerHTML = html;
    }
    
    // 商家库存系统
    var shopStock = {};
    
    function buyItem(item, price) {
        if (player.silver < price) {
            log("💸 银两不足！需要" + price + "银，您只有" + player.silver + "银。", "combat");
            return;
        }
        
        // 检查库存
        if (shopStock[item] !== undefined && shopStock[item] <= 0) {
            log("❌ " + item + " 已售罄，请稍后再来！", "combat");
            return;
        }
        
        // 扣除库存
        if (shopStock[item] !== undefined) {
            shopStock[item]--;
        }
        
        if (SHOP_ITEMS[item].mount) {
            player.mount = SHOP_ITEMS[item].mount;
            player.silver -= price;

        } else if (item === "干粮") {
            player.silver -= price;
            player.rations += 10;
            log("✅ 购买干粮×10，花费" + price + "银", "success");
            log("📦 干粮剩余：" + player.rations + "份 | 银两：" + player.silver + "银", "item");
        } else if (item === "地图") {
            player.silver -= price;
            // 发现所有相邻城市
            var loc = LOCATIONS[player.location];
            if (loc.nearby) {
                var added = 0;
                loc.nearby.forEach(function(c) {
                    if (player.discovered.indexOf(c) === -1) {
                        player.discovered.push(c);
                        added++;
                    }
                });
                if (added > 0) {
                    log("✅ 购买地图，花费" + price + "银", "success");
                    log("🗺️ 发现" + added + "个相邻城市：" + loc.nearby.join("、"), "success");
                } else {
                    log("❌ 这些地方您已经探索过了，退还" + price + "银。", "system");
                    player.silver += price;
                    if (shopStock[item] !== undefined) shopStock[item]++; // 退还库存
                }
            }
        } else if (SHOP_ITEMS[item].category === "装备") {
            player.silver -= price;
            player.inventory[item] = (player.inventory[item] || 0) + 1;
            log("✅ 购买" + item + "，花费" + price + "银", "success");
            log("📦 持有数量：" + player.inventory[item] + " | 打开背包点击\"使用\"装备。", "item");
        } else {
            player.silver -= price;
            player.inventory[item] = (player.inventory[item] || 0) + 1;
            log("✅ 购买" + item + "，花费" + price + "银", "success");
            log("📦 持有数量：" + player.inventory[item], "item");
        }
        
        updateUI();
        openShop(); // 刷新商店
    }

    // ==================== 贸易系统 ====================
    function openTrade() {

        }

        infoHtml += '<div style="color:#d4af37;font-size:0.85rem;margin-bottom:6px;">📍 ' + player.location + ' 商贸行情</div>';
        if (hub) {
            infoHtml += '<div style="color:#8acd7a;font-size:0.75rem;">★ 特产：' + GOODS[hub.specialty].desc + ' <span style="color:#d4af37">【' + hub.specialty + '】</span></div>';
            infoHtml += '<div style="color:#c97a7a;font-size:0.75rem;">☆ 急需：' + GOODS[hub.demand].desc + ' <span style="color:#d4af37">【' + hub.demand + '】</span></div>';

        // 当前货物
        var goodsValue = calculateGoodsValue();
        infoHtml += '<div style="color:#c4a060;font-size:0.8rem;margin-bottom:6px;">📦 我的货物（总价值：' + goodsValue + '银）</div>';
        
        var goodsHtml = "";
        var hasGoods = false;
        for (var g in player.goods) {
            if (player.goods[g] > 0) {
                hasGoods = true;
                var basePrice = GOODS[g] ? GOODS[g].basePrice : 10;
                var priceMod = hub && hub.specialty === g ? hub.priceBonus : (hub && hub.demand === g ? 1/hub.priceBonus : 1);
                var sellPrice = Math.round(basePrice * priceMod * (1 + Math.random() * 0.2));
                var isProfit = hub && hub.demand === g;
                
                goodsHtml += '<div class="item-row">';
                goodsHtml += '<div><span style="color:#c4b49c">' + g + '</span><span style="color:#d4af37"> ×' + player.goods[g] + '</span></div>';
                goodsHtml += '<div>';
                goodsHtml += '<span style="color:' + (isProfit ? '#8acd7a' : '#d4af37') + '">' + sellPrice + '银/个' + (isProfit ? ' ↑' : '') + '</span>';
                goodsHtml += '<button onclick="sellGoods(\'' + g + '\')" style="margin-left:8px;padding:4px 8px;background:#8b4513;color:#d4af37;border:none;border-radius:4px;cursor:pointer;">卖</button>';
                goodsHtml += '</div></div>';
            }
        }
        if (!hasGoods) {
            goodsHtml = '<div style="color:#8a7a6a;font-size:0.75rem;text-align:center;padding:10px;">暂无货物</div>';
        }
        
        // 可购买的货物
        infoHtml += goodsHtml;
        infoHtml += '<div style="color:#c4a060;font-size:0.8rem;margin:15px 0 6px;">🏪 可购货物</div>';
        
        var buyHtml = "";
        for (var item in GOODS) {
            var basePrice = GOODS[item].basePrice;
            var priceMod = hub && hub.demand === item ? hub.priceBonus : (hub && hub.specialty === item ? 1/hub.priceBonus : 1);
            var buyPrice = Math.round(basePrice * priceMod * (1 + Math.random() * 0.1));
            var canAfford = player.silver >= buyPrice;
            var isCheap = hub && hub.demand === item;
            
            buyHtml += '<div class="item-row">';
            buyHtml += '<div><span style="color:#c4b49c">' + item + '</span>';
            buyHtml += '<span style="font-size:0.7rem;color:#8a7a6a"> 重量' + GOODS[item].weight + ' | ' + GOODS[item].desc + '</span></div>';
            buyHtml += '<div>';
            buyHtml += '<span style="color:' + (isCheap ? '#8acd7a' : '#d4af37') + '">' + buyPrice + '银' + (isCheap ? ' ↓' : '') + '</span>';
            buyHtml += '<button onclick="buyGoods(\'' + item + '\', ' + buyPrice + ')" ' + (canAfford ? '' : 'disabled') + ' style="margin-left:8px;padding:4px 8px;background:#4a6a4a;color:#d4af37;border:none;border-radius:4px;cursor:pointer;' + (canAfford ? '' : 'opacity:0.5') + ';">买</button>';
            buyHtml += '</div></div>';
        }

        // 载重信息
        var currentLoad = calculateCurrentLoad();

        var maxLoad = mount ? mount.capacity : 10;
        infoHtml += '<div style="background:#1a1520;padding:8px;border-radius:6px;margin-top:15px;text-align:center;">';
        infoHtml += '🐴 载重：<span style="color:' + (currentLoad > maxLoad ? '#c97a7a' : '#8acd7a') + '">' + currentLoad + '</span> / ' + maxLoad;
        if (player.mount) {
            infoHtml += ' (' + mount.name + ')';
        } else {
            infoHtml += ' (步行)';
        }
        infoHtml += '<br><span style="font-size:0.7rem;color:#8a7a6a;">💰 银两：' + player.silver + '银</span>';
        infoHtml += '</div>';
        
        document.getElementById('tradeInfo').innerHTML = infoHtml;
        document.getElementById('tradeItems').innerHTML = "";
    }
    
    function sellGoods(goods) {
        if (!player.goods[goods] || player.goods[goods] <= 0) {
            log("没有货物可卖！", "system");
            return;
        }
        
        var hub = TRADE_HUBS[player.location];
        var basePrice = GOODS[goods] ? GOODS[goods].basePrice : 10;
        var priceMod = hub && hub.specialty === goods ? hub.priceBonus : (hub && hub.demand === goods ? 1/hub.priceBonus : 1);
        var sellPrice = Math.round(basePrice * priceMod);
        
        player.goods[goods]--;
        player.silver += sellPrice;
        
        if (player.goods[goods] <= 0) {
            delete player.goods[goods];
        }
        
        log("✅ 出售【" + goods + "】×1，获得" + sellPrice + "银两", "success");
        log("📦 剩余：" + (player.goods[goods] || 0) + "个 | 💰 银两：" + player.silver, "item");
        
        // 如果打开了贸易面板则刷新
        if (document.getElementById('tradePanel').style.display !== 'none') {
            openTrade();
        }
        updateUI();
    }
    
    function buyGoods(goods) {
        var hub = TRADE_HUBS[player.location];
        if (!hub) {
            log("此处非正规市场，无法购买货物。", "system");
            log("可前往徐州、下邳、寿春等大城购买。", "item");
            return;
        }
        
        if (!GOODS[goods]) {
            log("未知货物：「" + goods + "」。", "system");
            log("可选：" + Object.keys(GOODS).join("、"), "item");
            return;
        }
        
        var basePrice = GOODS[goods].basePrice;
        var priceMod = hub && hub.demand === goods ? hub.priceBonus : (hub && hub.specialty === goods ? 1/hub.priceBonus : 1);
        var buyPrice = Math.round(basePrice * priceMod);
        
        if (player.silver < buyPrice) {
            log("银两不足！需要" + buyPrice + "银。", "combat");
            log("您现有：" + player.silver + "银", "item");
            return;
        }
        
        var load = calculateCurrentLoad();
        var mount = MOUNTS[player.mount];
        var maxLoad = mount ? mount.capacity : 10;
        var weight = GOODS[goods].weight;
        
        if (load + weight > maxLoad) {
            log("载重不足！当前载重：" + load + "/" + maxLoad, "combat");
            log("可购买" + Math.floor((maxLoad - load) / weight) + "个「" + goods + "」", "item");
            return;
        }
        
        player.silver -= buyPrice;
        player.goods[goods] = (player.goods[goods] || 0) + 1;
        
        log("✅ 购买【" + goods + "】×1，花费" + buyPrice + "银两", "success");
        log("📦 持有：" + goods + " ×" + player.goods[goods] + " | 💰 银两：" + player.silver, "item");
        
        // 如果打开了贸易面板则刷新
        if (document.getElementById('tradePanel').style.display !== 'none') {
            openTrade();
        }
        updateUI();
    }
    
    function closeTrade() {
        document.getElementById('tradePanel').style.display = 'none';
        document.getElementById('mainPanel').style.display = 'block';
    }
    
    // ==================== 背包系统 ====================

            html += '<div style="color:#7a9acd;font-size:0.85rem;margin:15px 0 8px;">🎒 背包物品</div>';

                if (player.inventory[item] > 0) {
                    var useBtn = getItemUseButton(item);

    // 获取物品使用按钮
    function getItemUseButton(item) {
        var usableItems = ["伤药", "药材", "铁剑", "布衣"];
        if (usableItems.indexOf(item) === -1) {
            return '<span style="font-size:0.7rem;color:#8a7a6a;margin-left:8px;">(装备)</span>';
        }
        return '<button onclick="useItem(\'' + item + '\')" style="padding:4px 10px;background:#8b4513;color:#d4af37;border:none;border-radius:4px;cursor:pointer;margin-left:8px;">使用</button>';
    }
    
    // 使用物品
    function useItem(item) {
        log("【物品】", "system");
        
        if (item === "干粮") {
            if (player.rations <= 0) {
                log("没有干粮了！", "combat");
                return;
            }
            player.rations -= 1;
            var heal = 10;
            player.hp = Math.min(player.hp + heal, player.maxHp);
            log("吃了一份干粮，生命+10", "success");
            log("干粮：" + player.rations + " | 生命：" + player.hp + "/" + player.maxHp, "item");
        }
        else if (item === "伤药") {
            if (!player.inventory["伤药"] || player.inventory["伤药"] <= 0) {
                log("背包中没有伤药！", "combat");
                log("提示：可在商店购买（15银）或探索获得。", "item");
                return;
            }
            player.inventory["伤药"] -= 1;
            var heal = 30;
            player.hp = Math.min(player.hp + heal, player.maxHp);
            log("使用伤药，生命+30", "success");
            log("生命：" + player.hp + "/" + player.maxHp, "item");
        }
        else if (item === "药材") {
            if (!player.inventory["药材"] || player.inventory["药材"] <= 0) {
                log("背包中没有药材！", "combat");
                return;
            }
            player.inventory["药材"] -= 1;
            player.hp = Math.min(player.hp + 20, player.maxHp);
            player.int += 1;
            log("使用药材，生命+20，智力+1", "success");
        }
        else if (item === "铁剑") {
            if (!player.inventory["铁剑"] || player.inventory["铁剑"] <= 0) {
                log("背包中没有铁剑！", "combat");
                return;
            }
            player.atk += 5;
            player.inventory["铁剑"] -= 1;
            log("装备铁剑，武力+5", "success");
            log("当前武力：" + player.atk, "item");
        }
        else if (item === "布衣") {
            if (!player.inventory["布衣"] || player.inventory["布衣"] <= 0) {
                log("背包中没有布衣！", "combat");
                return;
            }
            player.maxHp += 10;
            player.hp += 10;
            player.inventory["布衣"] -= 1;
            log("装备布衣，最大生命+10", "success");
            log("当前生命上限：" + player.maxHp, "item");
        }
        else {
            log("这个物品无法直接使用。", "system");
            return;
        }
        
        updateUI();
        
        // 如果在背包界面，刷新显示
        if (document.getElementById('inventoryPanel').style.display === 'block') {
            openInventory();
        }
    }
    
    function closeInventory() {
        document.getElementById('inventoryPanel').style.display = 'none';
        document.getElementById('mainPanel').style.display = 'block';
    }

    function handleQA(text) {
        var weather = WEATHER_TYPES[player.weather];
        var mount = MOUNTS[player.mount];
        var loc = LOCATIONS[player.location];
        
        // 商旅相关关键词
        if (text.indexOf("道路") !== -1 || text.indexOf("路况") !== -1 || text.indexOf("路") !== -1) {
            if (loc.nearby && loc.nearby.length > 0) {
                var roadInfoList = [];
                loc.nearby.forEach(function(city) {
                    var key1 = player.location + "-" + city;
                    var key2 = city + "-" + player.location;
                    var roadInfo = player.roadIntel[key1] || player.roadIntel[key2];
                    if (roadInfo && roadInfo.known) {
                        var statusData = ROAD_STATUS[roadInfo.status] || ROAD_STATUS["崎岖"];
                        roadInfoList.push(statusData.icon + city + "：" + roadInfo.status);
                    } else {
                        roadInfoList.push("❓" + city + "：尚未探明");
                    }
                });
                log("【问答】" + player.location + "周边道路：" + roadInfoList.join(" | "), "item");
            } else {
                log("【问答】此地偏远，无相邻道路。", "system");
            }
            return;
        }
        
        if (text.indexOf("治安") !== -1 || text.indexOf("治理") !== -1) {
            var rulerInfo = FACTION_RULERS[loc.faction] || FACTION_RULERS["流浪"];
            var rulerStyle = RULER_STYLES[rulerInfo.style];
            log("【问答】" + rulerInfo.name + "治下：" + rulerStyle.icon + rulerStyle.desc, "item");
            if (rulerStyle.tax > 0) {
                log("商旅过路税约为货物价值的" + rulerStyle.tax + "%。", "system");
            } else {
                log("仁德之主，不收取过路税！", "success");
            }
            return;
        }
        
        if (text.indexOf("物价") !== -1 || text.indexOf("贸易") !== -1 || text.indexOf("市场") !== -1) {
            var hub = TRADE_HUBS[player.location];
            if (hub) {
                log("【问答】本地特产：" + GOODS[hub.specialty].desc + "【" + hub.specialty + "】", "item");
                log("急需物资：" + GOODS[hub.demand].desc + "【" + hub.demand + "】", "item");
            } else {
                log("【问答】此地无正规市场，贸易困难。", "system");
            }
            return;
        }
        
        var qa = {
            "曹操": "曹操，字孟德，乱世之奸雄，治军严谨，商旅经过需缴纳少量过路税。",
            "刘备": "刘备，字玄德，汉室宗亲，以仁义著称，治下免收过路税，夜间更有官军护送商旅。",
            "孙权": "孙权，字仲谋，江东之主，治国有方，治安良好，商旅安全。",
            "袁绍": "袁绍，四世三公，优柔寡断，治下平平，商旅正常往来。",
            "袁术": "袁术，野心勃勃，贪婪成性，过路税颇重，商旅苦不堪言。",
            "董卓": "董卓残暴不仁，烧杀抢掠，商旅视为畏途，非必要切勿前往！",
            "自己": "您乃" + player.role + "，孑然一身，商旅四方。",
            "这里": "此地乃" + player.location + "，" + loc.desc + "。道路为【" + (loc.road || "官道") + "】。",
            "环境": loc.envDesc || loc.desc,
            "天气": weather.icon + " " + weather.name + "，" + weather.desc + "。行军速度：" + Math.round(weather.speedMod * 100) + "%。",
            "干粮": "您随身携带" + player.rations + "份干粮。干粮用于探索和城市间移动。",
            "货物": "您的货物总价值约" + calculateGoodsValue() + "银两。",
            "载重": "当前载重" + calculateCurrentLoad() + "，" + (player.mount ? MOUNTS[player.mount].name : "步行") + "载重上限" + (player.mount ? MOUNTS[player.mount].capacity : 10) + "。",
            "护卫": "您有" + player.guard + "名护卫保护商队。",
            "坐骑": "您使用【" + mount.name + "】，移动速度+" + Math.round((mount.speedMod - 1) * 100) + "%，载重" + mount.capacity + "。",
            "日期": "现在是" + player.year + "年" + monthNames[player.month-1] + "月" + player.day + "日",
            "时间": "现在是" + player.year + "年" + monthNames[player.month-1] + "月" + player.day + "日",
            "今天": "今天是" + player.year + "年" + monthNames[player.month-1] + "月" + player.day + "日"
        };
        
        for (var k in qa) {
            if (text.indexOf(k) !== -1) { log("【问答】" + qa[k], "item"); return; }
        }
        log("此事...我亦不知。可问道路、治安、曹操、刘备、物价、干粮、货物、护卫等。", "system");
    }
    
    function showStatus() {
        var mount = MOUNTS[player.mount];
        var currentLoad = calculateCurrentLoad();
        var maxLoad = mount ? mount.capacity : 10;
        var goodsValue = calculateGoodsValue();
        
        log("【商旅状态】", "important");
        log("身份：" + player.role, "system");
        log("武力：" + player.atk + "  智力：" + player.int, "normal");
        log("生命：" + player.hp + "/" + player.maxHp, "normal");
        log("🍙 干粮：" + player.rations + "份", "normal");
        log("💰 银两：" + player.silver + "银", "normal");
        log("📦 货物价值：" + goodsValue + "银", "normal");
        log("🐴 交通工具：" + mount.name + "（载重" + maxLoad + "）", "item");
        log("⚖️ 当前载重：" + currentLoad + "/" + maxLoad + " (" + Math.round(currentLoad/maxLoad*100) + "%)", "item");
        log("🛡️ 商队护卫：" + player.guard + "人", "item");
        log("🏠 已探索：" + player.discovered.length + "处", "item");
        log("📅 日期：" + player.year + "年" + monthNames[player.month-1] + "月" + player.day + "日", "system");
    }
    
    // ==================== 随机事件 ====================
    function randomEvent() {
        var events = [
            { text: "遇到流民请求施舍", action: "beggar" },
            { text: "发现可疑足迹", action: "trace" },
            { text: "商队路过", action: "merchant" },
            { text: "遇到逃兵", action: "deserter" }
        ];
        
        var r = events[Math.floor(Math.random() * events.length)];
        
        if (r.action === "beggar") {
            if (player.rations >= 5) {
                player.rations -= 5;
                player.fame += 3;
                log("【事件】施舍流民5份干粮，名望+3", "success");
            } else if (player.silver >= 5) {
                player.silver -= 5;
                player.fame += 2;
                log("【事件】施舍流民5银两，名望+2", "success");
            } else {
                log("【事件】遇到流民请求施舍，但您囊中羞涩...", "system");
            }
        } else if (r.action === "trace") {
            log("【事件】前方可能有贼人，小心！", "system");
        } else if (r.action === "deserter") {
            log("【事件】遇到逃兵，您策马扬鞭，逃兵望尘莫及...", "system");
        }
    }
    
    // ==================== 任务系统 ====================
    function assignQuest() {
        player.quest = { title: "初入阵营", desc: "了解当前局势", target: "init" };
    }
    
    function checkQuest(type) {
        if (type === "city" && player.quest && player.quest.target === "init") {
            player.quest = { title: "探索四方", desc: "探索至少3座城池", target: "explore3" };
            log("【任务更新】" + player.quest.title, "important");
        }
        
        if (player.quest && player.quest.target === "explore3") {
            if (player.discovered.length >= 3) {
                player.fame += 20;
                log("★ 任务完成！名望+20", "success");
                player.quest = { title: "积累名望", desc: "名望达到50", target: "fame50" };
            }
        }
    }
    
    // ==================== 时间系统 ====================
    function advanceTime(days) {
        days = days || 1;
        for (var i = 0; i < days; i++) {
            player.day++;
            
            var daysInMonth = [29, 30, 29, 30, 29, 30, 29, 30, 29, 30, 29, 30];
            var maxDay = daysInMonth[player.month - 1];
            
            if (player.day > maxDay) {
                player.day = 1;
                player.month++;
                
                if (player.month > 12) {
                    player.month = 1;
                    player.year++;
                    log("【系统】公元" + player.year + "年到了！", "system");
                }
                
                if (Math.random() > 0.5) {
                    updateWeather();
                }
            }
        }
    }
    </script>
